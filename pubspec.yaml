name: osetrovich
description: Мобильное приложение интернет-магазина osetrovich.ru
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  mask_text_input_formatter: ^2.9.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17
  permission_handler: ^11.4.0
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0
  appmetrica_plugin: ^3.4.0
  appmetrica_push_plugin: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#213c57"
  image: assets/images/osetrovich_logo.png
  android_12:
    image: assets/images/osetrovich_logo_android12.png
    icon_background_color: "#213c57"

flutter:
  uses-material-design: true
  assets:
    - assets/images/osetrovich_logo.svg
    - assets/images/osetrovich_logo.png
    - assets/icons/vk.svg
    - assets/icons/ok.svg
