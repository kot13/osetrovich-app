openapi: 3.0.3
info:
  title: Osetrovich Mobile API
  description: |
    Дельта контракта каталога для фичи 009-product-contract-update.
    Полная спецификация — `openapi/openapi.yaml` в корне репозитория.
  version: 0.7.1

servers:
  - url: https://trout.osetrovich.ru/v1
    description: Production

tags:
  - name: catalog
    description: Каталог (изменения id и промо-флагов)

paths:
  /catalog/categories:
    get:
      tags: [catalog]
      summary: Список категорий (id — integer)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogCategory'

  /catalog/products:
    get:
      tags: [catalog]
      summary: Список товаров категории
      parameters:
        - name: categoryId
          in: query
          required: true
          description: Идентификатор категории; `all` — все товары
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /catalog/products/{id}:
    get:
      tags: [catalog]
      summary: Детальная информация о товаре (path id — integer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'

components:
  schemas:
    CatalogCategory:
      type: object
      required: [id, name, sortOrder]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Рыба
        sortOrder:
          type: integer

    ProductSummary:
      type: object
      required:
        - id
        - name
        - weightLabel
        - priceRub
        - oldPriceRub
        - imageUrl
        - categoryIds
        - sale
        - special
      properties:
        id:
          type: integer
          example: 1001
        name:
          type: string
        weightLabel:
          type: string
          example: 0.5 кг
        priceRub:
          type: integer
          minimum: 0
          description: Текущая цена; при special=true — спеццена
        oldPriceRub:
          type: integer
          minimum: 0
          description: Старая цена; при special=true — обычная цена
        imageUrl:
          type: string
          format: uri
        categoryIds:
          type: array
          items:
            type: integer
        sale:
          type: boolean
          description: Товар в акции — бейдж «Акция» в UI
        special:
          type: boolean
          description: Спеццена — бейдж «СПЕЦЦЕНА» в UI

    ProductDetail:
      type: object
      required:
        - id
        - name
        - weightLabel
        - priceRub
        - oldPriceRub
        - imageUrls
        - description
        - categoryIds
        - sale
        - special
      properties:
        id:
          type: integer
        name:
          type: string
        weightLabel:
          type: string
        priceRub:
          type: integer
        oldPriceRub:
          type: integer
        imageUrls:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        description:
          type: string
        categoryIds:
          type: array
          items:
            type: integer
        sale:
          type: boolean
        special:
          type: boolean

    ProductListResponse:
      type: object
      required: [items, total, hasMore, offset, limit]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        total:
          type: integer
        hasMore:
          type: boolean
        offset:
          type: integer
        limit:
          type: integer
