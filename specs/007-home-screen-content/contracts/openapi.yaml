openapi: 3.0.3
info:
  title: Osetrovich Mobile API
  description: REST API мобильного приложения osetrovich.ru (фаза home-screen-content)
  version: 0.7.0

servers:
  - url: https://api.osetrovich.ru/v1
    description: Production (будущее)
  - url: http://localhost:0/mock
    description: Mock (клиентский мок, не реальный сервер)

tags:
  - name: home
    description: Главная
  - name: orders
    description: Заказы

paths:
  /home/banners:
    get:
      tags: [home]
      summary: Баннеры для главной карусели
      operationId: getHomeBanners
      responses:
        '200':
          description: Список баннеров, отсортированный по sortOrder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeBannersResponse'
              example:
                items:
                  - id: banner-1
                    imageUrl: 'https://cdn.osetrovich.ru/banners/summer.jpg'
                    sortOrder: 0
                    link:
                      type: external
                      url: 'https://osetrovich.ru'
                  - id: banner-2
                    imageUrl: 'https://cdn.osetrovich.ru/banners/promo.jpg'
                    sortOrder: 1
                    link:
                      type: promotion
                      targetId: promo-1
                  - id: banner-3
                    imageUrl: 'https://cdn.osetrovich.ru/banners/product.jpg'
                    sortOrder: 2
                    link:
                      type: product
                      targetId: p1

  /home/weekly-products:
    get:
      tags: [home]
      summary: Товары недели для горизонтальной ленты на главной
      operationId: getWeeklyProducts
      responses:
        '200':
          description: Список товаров недели
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyProductsResponse'

  /orders/current:
    get:
      tags: [orders]
      summary: Текущий (последний актуальный) заказ пользователя
      operationId: getCurrentOrder
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий заказ или null, если нет актуального
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentOrderResponse'
              examples:
                active:
                  value:
                    order:
                      id: ord-1002
                      orderNumber: ORD-1002
                      items:
                        - productId: p1
                          name: Сёмга слабосолёная
                          weightLabel: 500 г
                          priceRub: 890
                          quantity: 1
                          lineTotalRub: 890
                      itemsSubtotalRub: 890
                      deliveryFeeRub: 300
                      totalRub: 1190
                      deliveryAddress: 'г. Санкт-Петербург, Невский пр., д. 1'
                      comment: null
                      status: delivery
                      createdAt: '2026-07-15T10:00:00Z'
                      ratingState: not_applicable
                      ratingStars: null
                noOrder:
                  value:
                    order: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/{orderId}/rating:
    post:
      tags: [orders]
      summary: Оценить выполненный заказ
      operationId: submitOrderRating
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitOrderRatingRequest'
            example:
              stars: 5
              comment: 'Всё отлично!'
      responses:
        '200':
          description: Оценка сохранена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentOrder'
        '400':
          description: Некорректная оценка или заказ не в статусе completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Оценка уже отправлена или пропущена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{orderId}/rating/skip:
    post:
      tags: [orders]
      summary: Пропустить оценку выполненного заказа
      operationId: skipOrderRating
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Пропуск зафиксирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentOrder'
        '400':
          description: Заказ не в статусе completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Оценка уже отправлена или пропущена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Требуется авторизация
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: unauthorized
            message: Требуется авторизация

  schemas:
    HomeBannersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/Banner'

    Banner:
      type: object
      required: [id, imageUrl, sortOrder, link]
      properties:
        id:
          type: string
        imageUrl:
          type: string
          format: uri
        sortOrder:
          type: integer
        link:
          $ref: '#/components/schemas/BannerLink'

    BannerLink:
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/BannerLinkType'
        url:
          type: string
          format: uri
          description: Обязателен при type=external
        targetId:
          type: string
          description: Обязателен при type=promotion, news или product

    BannerLinkType:
      type: string
      enum: [none, external, promotion, news, product]

    WeeklyProductsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'

    ProductSummary:
      type: object
      required: [id, name, weightLabel, priceRub, imageUrl, categoryIds]
      properties:
        id:
          type: string
        name:
          type: string
        weightLabel:
          type: string
        priceRub:
          type: integer
          minimum: 0
        imageUrl:
          type: string
          format: uri
        categoryIds:
          type: array
          items:
            type: string

    CurrentOrderResponse:
      type: object
      required: [order]
      properties:
        order:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CurrentOrder'

    CurrentOrder:
      type: object
      required:
        - id
        - orderNumber
        - items
        - itemsSubtotalRub
        - deliveryFeeRub
        - totalRub
        - deliveryAddress
        - status
        - createdAt
        - ratingState
      properties:
        id:
          type: string
        orderNumber:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderLine'
        itemsSubtotalRub:
          type: integer
          minimum: 0
        deliveryFeeRub:
          type: integer
          minimum: 0
        totalRub:
          type: integer
          minimum: 0
        deliveryAddress:
          type: string
        comment:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        ratingState:
          $ref: '#/components/schemas/OrderRatingState'
        ratingStars:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true

    OrderLine:
      type: object
      required:
        - productId
        - name
        - weightLabel
        - priceRub
        - quantity
        - lineTotalRub
      properties:
        productId:
          type: string
        name:
          type: string
        weightLabel:
          type: string
        priceRub:
          type: integer
          minimum: 0
        quantity:
          type: integer
          minimum: 1
        lineTotalRub:
          type: integer
          minimum: 0

    OrderStatus:
      type: string
      enum:
        - accepted
        - processing
        - assembly
        - delivery
        - completed
      description: |
        accepted — Принят; processing — В обработке; assembly — Сборка;
        delivery — Доставка; completed — Выполнено.
        Значение pending из POST /orders (v0.5.0) трактуется как accepted.

    OrderRatingState:
      type: string
      enum:
        - not_applicable
        - pending
        - submitted
        - skipped

    SubmitOrderRatingRequest:
      type: object
      required: [stars]
      properties:
        stars:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 500
          nullable: true

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
