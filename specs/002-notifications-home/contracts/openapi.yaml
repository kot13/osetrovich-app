openapi: 3.0.3
info:
  title: Osetrovich Mobile API
  description: REST API мобильного приложения osetrovich.ru (фаза notifications-home)
  version: 0.2.0

servers:
  - url: https://api.osetrovich.ru/v1
    description: Production (будущее)
  - url: http://localhost:0/mock
    description: Mock (клиентский мок, не реальный сервер)

tags:
  - name: auth
    description: SMS-авторизация и JWT
  - name: catalog
    description: Каталог
  - name: home
    description: Главная
  - name: notifications
    description: Уведомления

paths:
  /auth/sms/request:
    post:
      tags: [auth]
      summary: Запросить отправку СМС-кода
      operationId: requestSmsCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsRequestBody'
      responses:
        '200':
          description: Код отправлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/sms/verify:
    post:
      tags: [auth]
      summary: Подтвердить СМС-код и получить JWT
      operationId: verifySmsCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsVerifyBody'
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Неверный код или телефон
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Обновить access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [auth]
      summary: Выход
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Успешный выход
        '401':
          $ref: '#/components/responses/Unauthorized'

  /catalog/categories:
    get:
      tags: [catalog]
      summary: Список категорий для Filter Chips
      operationId: getCategories
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogCategory'

  /home/banners:
    get:
      tags: [home]
      summary: Баннеры для главной карусели (ожидается 3 для демо)
      operationId: getHomeBanners
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    minItems: 1
                    items:
                      $ref: '#/components/schemas/Banner'
              example:
                items:
                  - id: "1"
                    imageUrl: "https://example.com/b1.jpg"
                    sortOrder: 0
                  - id: "2"
                    imageUrl: "https://example.com/b2.jpg"
                    sortOrder: 1
                  - id: "3"
                    imageUrl: "https://example.com/b3.jpg"
                    sortOrder: 2

  /notifications:
    get:
      tags: [notifications]
      summary: Список in-app уведомлений
      operationId: getNotifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список уведомлений
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
              example:
                items:
                  - id: n1
                    title: Скидка на икру
                    body: До конца недели скидка 15% на красную икру.
                    createdAt: "2026-07-14T10:00:00Z"
                    isRead: false
                  - id: n2
                    title: Новая поставка крабов
                    body: Камчатский краб уже в каталоге.
                    createdAt: "2026-07-13T14:30:00Z"
                    isRead: false
                  - id: n3
                    title: Ваш заказ доставлен
                    body: Заказ №12345 успешно доставлен.
                    createdAt: "2026-07-12T09:15:00Z"
                    isRead: false
                  - id: n4
                    title: Акция выходного дня
                    body: Скидки на рыбу в субботу и воскресенье.
                    createdAt: "2026-07-10T08:00:00Z"
                    isRead: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}:
    get:
      tags: [notifications]
      summary: Детальное уведомление
      operationId: getNotificationById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Уведомление не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    post:
      tags: [notifications]
      summary: Отметить уведомление прочитанным
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Уведомление отмечено прочитанным
        '404':
          description: Уведомление не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/read-all:
    post:
      tags: [notifications]
      summary: Отметить все уведомления прочитанными
      operationId: markAllNotificationsRead
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Все уведомления отмечены прочитанными
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/unread-count:
    get:
      tags: [notifications]
      summary: Количество непрочитанных (сводка; UI может вычислять из списка)
      operationId: getUnreadNotificationCount
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Требуется авторизация
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SmsRequestBody:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^\+7\d{10}$'

    SmsRequestResponse:
      type: object
      required: [retryAfterSeconds]
      properties:
        retryAfterSeconds:
          type: integer
          example: 60

    SmsVerifyBody:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string
          pattern: '^\d{6}$'

    RefreshBody:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          enum: [Bearer]

    CatalogCategory:
      type: object
      required: [id, name, sortOrder]
      properties:
        id:
          type: string
        name:
          type: string
        sortOrder:
          type: integer

    Banner:
      type: object
      required: [id, imageUrl, sortOrder]
      properties:
        id:
          type: string
        imageUrl:
          type: string
          format: uri
        linkUrl:
          type: string
          format: uri
          nullable: true
        sortOrder:
          type: integer

    Notification:
      type: object
      required: [id, title, body, createdAt, isRead]
      properties:
        id:
          type: string
          example: n1
        title:
          type: string
          example: Скидка на икру
        body:
          type: string
          description: Полное содержимое уведомления
          example: До конца недели скидка 15% на красную икру.
        createdAt:
          type: string
          format: date-time
          example: "2026-07-14T10:00:00Z"
        isRead:
          type: boolean
          example: false

    UnreadCountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          minimum: 0
          example: 3

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
