openapi: 3.0.3
info:
  title: Osetrovich Mobile API
  description: REST API мобильного приложения osetrovich.ru (фаза user-profile)
  version: 0.3.0

servers:
  - url: https://api.osetrovich.ru/v1
    description: Production (будущее)
  - url: http://localhost:0/mock
    description: Mock (клиентский мок, не реальный сервер)

tags:
  - name: auth
    description: SMS-авторизация и JWT
  - name: catalog
    description: Каталог
  - name: home
    description: Главная
  - name: notifications
    description: Уведомления
  - name: profile
    description: Профиль пользователя

paths:
  /auth/sms/request:
    post:
      tags: [auth]
      summary: Запросить отправку СМС-кода
      operationId: requestSmsCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsRequestBody'
      responses:
        '200':
          description: Код отправлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/sms/verify:
    post:
      tags: [auth]
      summary: Подтвердить СМС-код и получить JWT
      operationId: verifySmsCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsVerifyBody'
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Неверный код или телефон
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Обновить access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [auth]
      summary: Выход
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Успешный выход
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/me:
    get:
      tags: [profile]
      summary: Текущий профиль пользователя
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: u1
                name: Покупатель
                phone: "+79001234567"
                email: null
                emailVerified: false
                pushEnabled: true
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [profile]
      summary: Обновить имя профиля
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/phone/request:
    post:
      tags: [profile]
      summary: Запросить СМС-код для смены телефона
      operationId: requestPhoneChange
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneChangeRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/phone/verify:
    post:
      tags: [profile]
      summary: Подтвердить смену телефона
      operationId: verifyPhoneChange
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneChangeVerifyBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Неверный код
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/email/request:
    post:
      tags: [profile]
      summary: Запросить код подтверждения email
      operationId: requestEmailVerification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerifyRequestBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/email/verify:
    post:
      tags: [profile]
      summary: Подтвердить email
      operationId: verifyEmail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerifyBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Неверный код
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/preferences:
    get:
      tags: [profile]
      summary: Настройки профиля
      operationId: getProfilePreferences
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [profile]
      summary: Обновить настройки профиля
      operationId: updateProfilePreferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfilePreferencesBody'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /catalog/categories:
    get:
      tags: [catalog]
      summary: Список категорий для Filter Chips
      operationId: getCategories
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogCategory'

  /home/banners:
    get:
      tags: [home]
      summary: Баннеры для главной карусели (ожидается 3 для демо)
      operationId: getHomeBanners
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    minItems: 1
                    items:
                      $ref: '#/components/schemas/Banner'

  /notifications:
    get:
      tags: [notifications]
      summary: Список in-app уведомлений
      operationId: getNotifications
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}:
    get:
      tags: [notifications]
      summary: Детальное уведомление
      operationId: getNotificationById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Уведомление не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    post:
      tags: [notifications]
      summary: Отметить уведомление прочитанным
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Уведомление отмечено прочитанным
        '404':
          description: Уведомление не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/read-all:
    post:
      tags: [notifications]
      summary: Отметить все уведомления прочитанными
      operationId: markAllNotificationsRead
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Все уведомления отмечены прочитанными
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/unread-count:
    get:
      tags: [notifications]
      summary: Количество непрочитанных
      operationId: getUnreadNotificationCount
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Требуется авторизация
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Конфликт (телефон или email уже используется)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SmsRequestBody:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^\+7\d{10}$'

    SmsRequestResponse:
      type: object
      required: [retryAfterSeconds]
      properties:
        retryAfterSeconds:
          type: integer
          example: 60

    SmsVerifyBody:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string
          pattern: '^\d{6}$'

    RefreshBody:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          enum: [Bearer]

    UserProfile:
      type: object
      required: [id, name, phone, emailVerified, pushEnabled]
      properties:
        id:
          type: string
          example: u1
        name:
          type: string
          example: Покупатель
        phone:
          type: string
          pattern: '^\+7\d{10}$'
          example: "+79001234567"
        email:
          type: string
          format: email
          nullable: true
          example: user@example.com
        emailVerified:
          type: boolean
          example: false
        pushEnabled:
          type: boolean
          example: true

    UpdateProfileBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    PhoneChangeRequestBody:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^\+7\d{10}$'

    PhoneChangeVerifyBody:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          pattern: '^\+7\d{10}$'
        code:
          type: string
          pattern: '^\d{6}$'

    EmailVerifyRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerifyBody:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: '^\d{6}$'

    ProfilePreferences:
      type: object
      required: [pushEnabled]
      properties:
        pushEnabled:
          type: boolean

    UpdateProfilePreferencesBody:
      type: object
      required: [pushEnabled]
      properties:
        pushEnabled:
          type: boolean

    CatalogCategory:
      type: object
      required: [id, name, sortOrder]
      properties:
        id:
          type: string
        name:
          type: string
        sortOrder:
          type: integer

    Banner:
      type: object
      required: [id, imageUrl, sortOrder]
      properties:
        id:
          type: string
        imageUrl:
          type: string
          format: uri
        linkUrl:
          type: string
          format: uri
          nullable: true
        sortOrder:
          type: integer

    Notification:
      type: object
      required: [id, title, body, createdAt, isRead]
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        isRead:
          type: boolean

    UnreadCountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - invalid_request
            - invalid_code
            - invalid_email
            - phone_taken
            - email_taken
            - unauthorized
        message:
          type: string
